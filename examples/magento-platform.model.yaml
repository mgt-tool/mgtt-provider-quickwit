# A real Magento storefront — async business flows, queue hops, and consumer
# pools wired up as Quickwit invariants alongside the queue and database
# infrastructure they depend on.
#
# Usage:
#   export MGTT_MODEL=examples/magento-platform.model.yaml
#   mgtt plan --component order_to_email_flow

meta:
  name: magento-storefront
  version: "1.0"
  providers:
    - kubernetes
    - aws
    - quickwit
  vars:
    namespace: magento
    quickwit_url: http://quickwit.observability.svc:7280

components:
  # ── Infrastructure ─────────────────────────────────────────────────────
  rabbitmq:
    type: aws.amazonmq_broker
    providers: [aws]
    vars: {identifier: magento-stage-mq}

  rds:
    type: aws.rds_instance
    providers: [aws]
    vars: {identifier: magento-prod}

  cron_singleton:
    type: kubernetes.deployment
    vars: {name: magento-cron, namespace: "{namespace}"}

  consumer_pool_blue:
    type: kubernetes.deployment
    vars: {name: magento-consumer-blue, namespace: "{namespace}"}

  # ── Business flows: started in HTTP, completed by async consumer ────────
  order_to_email_flow:
    type: tracing.transaction_flow
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      start_span: "checkout.order.placed"
      end_span: "email.order_confirmation.sent"
    depends_on: [rabbitmq, consumer_pool_blue]

  catalog_import_to_searchable:
    type: tracing.transaction_flow
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      start_span: "admin.catalog.import.received"
      end_span: "catalog.index.refresh.complete"
    depends_on: [rabbitmq, consumer_pool_blue, rds]

  # ── Single-hop SLOs: one publish → one consume boundary ─────────────────
  shipment_email_hop:
    type: tracing.async_hop
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      producer_span: "queue.publish.sales_email_order_shipment"
      consumer_span: "queue.consume.sales_email_order_shipment"
      service_name: "magento-consumer"
    depends_on: [rabbitmq, consumer_pool_blue]

  inventory_reservation_hop:
    type: tracing.async_hop
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      producer_span: "queue.publish.inventory.reservations.update"
      consumer_span: "queue.consume.inventory.reservations.update"
      service_name: "magento-consumer"
    depends_on: [rabbitmq, consumer_pool_blue, rds]

  image_resize_hop:
    type: tracing.async_hop
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      producer_span: "queue.publish.media.storage.catalog.image.resize"
      consumer_span: "queue.consume.media.storage.catalog.image.resize"
    depends_on: [rabbitmq, consumer_pool_blue]

  # ── Consumer pool health ────────────────────────────────────────────────
  email_consumer_pool:
    type: tracing.consumer_health
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      consumer_span: "queue.consume.sales_email_order_shipment"
      service_name: "magento-consumer"
    depends_on: [consumer_pool_blue]

  bulk_ops_consumer_pool:
    type: tracing.consumer_health
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      consumer_span: "queue.consume.async.operations.all"
      service_name: "magento-consumer"
    depends_on: [consumer_pool_blue, rds]
