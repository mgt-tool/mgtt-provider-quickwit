# A real Magento storefront, watched the way operators actually think about it.
#
# Three failure modes that single-span tools (Tempo, Jaeger, raw dashboards)
# cannot see, but Quickwit's cross-span aggregations make trivial:
#   • a flow that starts but never ends — orders without confirmation emails
#   • a queue boundary that drops work — publishes without matching consumes
#   • a worker fleet that quietly empties — consumers gone, queue silent
#
# Usage:
#   export MGTT_MODEL=examples/magento-platform.model.yaml
#   mgtt plan --component order_to_email_flow

meta:
  name: magento-storefront
  version: "1.0"
  providers:
    - aws
    - quickwit
  vars:
    quickwit_url: http://quickwit.observability.svc:7280

components:
  # ── The infrastructure every flow leans on ─────────────────────────────
  rabbitmq:
    type: aws.amazonmq_broker
    providers: [aws]
    vars: {identifier: magento-stage-mq}

  rds:
    type: aws.rds_instance
    providers: [aws]
    vars: {identifier: magento-prod}

  # ── Did the business outcome actually happen? ──────────────────────────
  # Two spans bookend each flow: the request that opens the work, and the
  # event that closes it. completion_rate = closes ÷ opens. When orders
  # pile up and emails don't, mgtt walks downstream from here through
  # rabbitmq → consumer pool → database to surface the cause.
  order_to_email_flow:
    type: tracing.transaction_flow
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      start_span: "checkout.order.placed"
      end_span: "email.order_confirmation.sent"
    depends_on: [rabbitmq]

  catalog_import_to_searchable:
    type: tracing.transaction_flow
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      start_span: "admin.catalog.import.received"
      end_span: "catalog.index.refresh.complete"
    depends_on: [rabbitmq, rds]

  # ── Is the queue carrying its load? ────────────────────────────────────
  # The smallest unit of "did the message survive the hop". Lagging
  # publish-vs-consume counts mean backlog; consumer-side errors mean
  # retries piling up. One component per topic of interest.
  shipment_email_hop:
    type: tracing.async_hop
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      producer_span: "queue.publish.sales_email_order_shipment"
      consumer_span: "queue.consume.sales_email_order_shipment"
      service_name: "magento-consumer"
    depends_on: [rabbitmq]

  inventory_reservation_hop:
    type: tracing.async_hop
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      producer_span: "queue.publish.inventory.reservations.update"
      consumer_span: "queue.consume.inventory.reservations.update"
      service_name: "magento-consumer"
    depends_on: [rabbitmq, rds]

  image_resize_hop:
    type: tracing.async_hop
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      producer_span: "queue.publish.media.storage.catalog.image.resize"
      consumer_span: "queue.consume.media.storage.catalog.image.resize"
    depends_on: [rabbitmq]

  # ── Is the worker fleet alive? ─────────────────────────────────────────
  # Hops watch the queue; pools watch the workers. Distinguishes "queue
  # empty because nothing to do" from "queue empty because nobody home" —
  # two states that look identical on a dashboard but have opposite fixes.
  # Spans here are deliberately ones no hop covers, so the signal is fresh.
  catalog_alert_consumer_pool:
    type: tracing.consumer_health
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      consumer_span: "queue.consume.catalog_product_alert"
      service_name: "magento-consumer"

  bulk_ops_consumer_pool:
    type: tracing.consumer_health
    providers: [quickwit]
    vars:
      quickwit_url: "{quickwit_url}"
      consumer_span: "queue.consume.async.operations.all"
      service_name: "magento-consumer"
    depends_on: [rds]
